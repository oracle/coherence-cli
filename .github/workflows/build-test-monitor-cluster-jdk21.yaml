# ---------------------------------------------------------------------------
# Coherence CLI GitHub Actions CI build - Test Monitor Cluster JDK21
# ---------------------------------------------------------------------------
name: CI Test Monitor Cluster JDK21

on:
  workflow_dispatch:
  push:
    branches-ignore:
      - gh-pages

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        coherenceVersion:
          - 22.06.12
          - 22.06.15
          - 25.03.2
          - 15.1.1-0-1
          - 14.1.2-0-2
          - 14.1.2-0-5
        javaVersion:
          - 21

#   Checkout the source, we need a depth of zero to fetch all of the history otherwise
#   the copyright check cannot work out the date of the files from Git.
    steps:
    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        fetch-depth: 0

    - name: Set up JDK
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
      with:
        java-version: ${{ matrix.javaVersion }}
        distribution: 'zulu'

    - name: Cache Go Modules
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/go/pkg/mod
        key: ${{ runner.os }}-go-mods-${{ hashFiles('**/go.sum') }}
        restore-keys: |
          ${{ runner.os }}-go-mods-

    - name: Cache Maven packages
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Set up Go
      uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
      with:
        go-version-file: 'go.mod'

    - name: Build cohctl
      shell: bash
      run: make cohctl

    - name: Test Monitor Cluster
      shell: bash
      run: |
        sudo apt-add-repository universe -y
        sudo apt-get install expect -y
        COHERENCE_VERSION=${{ matrix.coherenceVersion }} make test-monitor-cluster

    - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
      if: failure()
      with:
        name: test-output-${{ matrix.coherenceVersion }}-${{ matrix.javaVersion }}
        path: build/_output/test-logs
