# ---------------------------------------------------------------------------
# Coherence CLI GitHub Actions CI build - Install AMD - No Copy
# ---------------------------------------------------------------------------
name: CI - Install AMD

on:
  schedule:
    # Once a week
    - cron: '0 0 * * 0'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Test Installing CLI via verified installer for Linux AMD with COPY=false
      shell: bash
      run: |
        set -euo pipefail

        INSTALL_SCRIPT_URL="https://raw.githubusercontent.com/oracle/coherence-cli/main/scripts/install.sh"
        # Update this hash whenever scripts/install.sh changes intentionally.
        EXPECTED_SHA256="45ac74a3d9e5fbe8e7f4d412e8a04a56d3cf6e0670f127d9ad0d8a71ce09e27c"
        script_path="$(mktemp)"

        export COPY=false
        curl -fsSL -o "${script_path}" "${INSTALL_SCRIPT_URL}"

        actual_sha256="$(sha256sum "${script_path}" | awk '{print $1}')"
        if [ "${actual_sha256}" != "${EXPECTED_SHA256}" ]; then
          echo "Installer checksum mismatch: expected ${EXPECTED_SHA256}, got ${actual_sha256}"
          exit 1
        fi

        chmod u+x "${script_path}"
        bash "${script_path}" > /tmp/test 2>&1
        location=$(cat /tmp/test | grep downloaded | sed 's/^cohctl downloaded to //' | awk '{print $1}' | sed 's/,//')
        $location version
